<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家装产教融合AI闭环工作流</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        
        header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        header p {
            color: #666;
            font-size: 16px;
        }
        
        .stage {
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .stage h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 24px;
        }
        
        .stage p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .upload-area, .submission-area {
            margin-top: 20px;
        }
        
        input[type="file"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            min-height: 100px;
        }
        
        .result-area h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .result-area p {
            color: #333;
            line-height: 1.6;
        }
        
        /* 新增样式 */
        .materials-section {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
            border-left: 4px solid #667eea;
            margin-top: 15px;
        }
        
        .section-title {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .section-content {
            color: #333;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .generate-area {
            margin-top: 15px;
        }
        
        .generate-area button {
            width: 100%;
        }
        
        .task-list {
            list-style: none;
        }
        
        .task-list li {
            padding: 15px;
            background: #f0f0f0;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .task-list h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .task-list p {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>家装产教融合AI闭环工作流</h1>
            <p>企业上传项目 → AI自动成课 → 学生同步实战 → 成果反哺企业</p>
        </header>
        
        <main>
            <div class="stage" id="stage1">
                <h2>第一阶段：企业端</h2>
                <p>上传家装项目材料，AI 自动生成教学内容</p>
                <div class="upload-area">
                    <input type="file" id="projectFile" accept=".pdf,.doc,.docx,.txt,.jpg,.png">
                    <button onclick="uploadProject()">上传项目</button>
                </div>
                <div id="courseContent" class="result-area"></div>
            </div>
            
            <div class="stage" id="stage2">
                <h2>第二阶段：教学端</h2>
                <p>查看AI生成的教学内容和标准资料库</p>
                <div class="result-area">
                    <h3>教学材料与标准资料库</h3>
                    
                    <!-- 企业项目资料分析部分 -->
                    <div class="materials-section">
                        <h4 class="section-title">企业项目资料分析</h4>
                        <div id="teachingMaterials" class="section-content"></div>
                    </div>
                    
                    <!-- 标准资料库部分 -->
                    <div class="generate-area" style="margin-top: 20px;">
                        <button onclick="generateMaterials()">生成标准资料库</button>
                    </div>
                    <div id="standardMaterials" class="materials-section" style="margin-top: 20px;"></div>
                </div>
            </div>
            
            <div class="stage" id="stage3">
                <h2>第三阶段：学生端</h2>
                <p>学生提交作业，AI 自动评估反馈</p>
                <div class="submission-area">
                    <textarea id="submissionText" placeholder="请输入作业内容..."></textarea>
                    <button onclick="submitHomework()">提交作业</button>
                </div>
                <div id="feedback" class="result-area"></div>
            </div>
        </main>
    </div>
    
    <script>
        function uploadProject() {
            const fileInput = document.getElementById('projectFile');
            const resultArea = document.getElementById('courseContent');
            
            if (fileInput.files.length === 0) {
                resultArea.innerHTML = '<p style="color: red;">请先选择文件</p>';
                return;
            }
            
            resultArea.innerHTML = '<p>正在上传...</p>';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            fetch('/upload_project', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultArea.innerHTML = '<h3>生成成功！</h3><p>' + data.data.course_content + '</p>';
                    // 同时更新教学端
                    const teachingMaterials = document.getElementById('teachingMaterials');
                    if (teachingMaterials) {
                        teachingMaterials.innerHTML = '<p>' + data.data.course_content + '</p>';
                    }
                } else {
                    resultArea.innerHTML = '<p style="color: red;">' + data.error + '</p>';
                }
            })
            .catch(error => {
                resultArea.innerHTML = '<p style="color: red;">上传失败：' + error + '</p>';
            });
        }
        
        function generateMaterials() {
            const materialsArea = document.getElementById('standardMaterials');
            
            materialsArea.innerHTML = '<p>正在生成标准资料库...</p>';
            
            // 模拟生成标准资料库
            setTimeout(() => {
                const materials = `
                    <h4 style="color: #667eea; margin-bottom: 10px;">家装设计标准资料库</h4>
                    
                    <h5 style="margin-top: 15px; margin-bottom: 5px;">一、设计规范</h5>
                    <p>1. 空间布局原则：保证动线流畅，功能分区明确</p>
                    <p>2. 色彩搭配：遵循 60-30-10 原则，主色60%，辅助色30%，点缀色10%</p>
                    <p>3. 照明设计：采用基础照明、重点照明、氛围照明三层设计</p>
                    
                    <h5 style="margin-top: 15px; margin-bottom: 5px;">二、常用户型解析</h5>
                    <p>1. 两居室：适合2-4人居住，核心区域为客厅和主卧</p>
                    <p>2. 三居室：适合3-6人居住，需要规划多功能空间</p>
                    <p>3. 四居室：适合4-8人居住，注重私密性和公共空间的平衡</p>
                    
                    <h5 style="margin-top: 15px; margin-bottom: 5px;">三、材料选择指南</h5>
                    <p>1. 地面材料：瓷砖、实木地板、复合地板</p>
                    <p>2. 墙面材料：乳胶漆、壁纸、硅藻泥</p>
                    <p>3. 顶面材料：石膏板吊顶、集成吊顶、裸顶</p>
                    
                    <h5 style="margin-top: 15px; margin-bottom: 5px;">四、预算分配建议</h5>
                    <p>1. 硬装（水电、墙地、吊顶）：40%</p>
                    <p>2. 软装（家具、窗帘、饰品）：30%</p>
                    <p>3. 电器设备：20%</p>
                    <p>4. 备用金：10%</p>
                    
                    <h5 style="margin-top: 15px; margin-bottom: 5px;">五、学生任务清单</h5>
                    <ul class="task-list">
                        <li>
                            <h4>任务1：户型分析</h4>
                            <p>分析给定户型的优缺点，提出改进建议</p>
                        </li>
                        <li>
                            <h4>任务2：方案设计</h4>
                            <p>根据户型特点和用户需求，完成平面布局设计</p>
                        </li>
                        <li>
                            <h4>任务3：材料搭配</h4>
                            <p>选择合适的材料，完成材料方案和预算表</p>
                        </li>
                        <li>
                            <h4>任务4：效果渲染</h4>
                            <p>制作3D效果图，展示最终设计方案</p>
                        </li>
                    </ul>
                `;
                
                materialsArea.innerHTML = materials;
            }, 1500);
        }
        
        function submitHomework() {
            const textInput = document.getElementById('submissionText');
            const resultArea = document.getElementById('feedback');
            
            if (textInput.value.trim() === '') {
                resultArea.innerHTML = '<p style="color: red;">请输入作业内容</p>';
                return;
            }
            
            resultArea.innerHTML = '<p>正在提交...</p>';
            
            fetch('/submit_homework', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    submission: textInput.value
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultArea.innerHTML = '<h3>提交成功！</h3><p>' + data.data.feedback + '</p>';
                } else {
                    resultArea.innerHTML = '<p style="color: red;">' + data.error + '</p>';
                }
            })
            .catch(error => {
                resultArea.innerHTML = '<p style="color: red;">提交失败：' + error + '</p>';
            });
        }
    </script>
</body>
</html>
