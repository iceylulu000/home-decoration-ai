<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家装产教融合AI闭环工作流</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #667eea;
        }
        
        header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        header p {
            color: #666;
            font-size: 16px;
        }
        
        .stage {
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .stage h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 24px;
        }
        
        .stage p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .upload-area, .submission-area {
            margin-top: 20px;
        }
        
        input[type="file"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        textarea {
            min-height: 150px;
            resize: vertical;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            min-height: 100px;
        }
        
        .result-area h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .result-area p {
            color: #333;
            line-height: 1.6;
        }
        
        .task-list {
            list-style: none;
        }
        
        .task-list li {
            padding: 15px;
            background: #f0f0f0;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .task-list h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .task-list p {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>家装产教融合AI闭环工作流</h1>
            <p>企业上传项目 → AI自动成课 → 学生同步实战 → 成果反哺企业</p>
        </header>
        
        <main>
            <div class="stage" id="stage1">
                <h2>第一阶段：企业端</h2>
                <p>上传家装项目材料，AI 自动生成教学内容</p>
                <div class="upload-area">
                    <input type="file" id="projectFile" accept=".pdf,.doc,.docx,.txt,.jpg,.png">
                    <button onclick="uploadProject()">上传项目</button>
                </div>
                <div id="courseContent" class="result-area"></div>
            </div>
            
           <div class="stage" id="stage2">
    <h2>第二阶段：教学端</h2>
    <p>查看AI生成的教学内容和学生任务</p>
    <div class="generate-area">
        <button onclick="generateMaterials()">生成标准资料库</button>
    </div>
    <div id="teachingMaterials" class="result-area"></div>
</div>
            
            <div class="stage" id="stage3">
                <h2>第三阶段：学生端</h2>
                <p>学生提交作业，AI 自动评估反馈</p>
                <div class="submission-area">
                    <textarea id="submissionText" placeholder="请输入作业内容..."></textarea>
                    <button onclick="submitHomework()">提交作业</button>
                </div>
                <div id="feedback" class="result-area"></div>
            </div>
        </main>
    </div>
    
    <script>
        // 简单的JavaScript功能
        function uploadProject() {
            const fileInput = document.getElementById('projectFile');
            const resultArea = document.getElementById('courseContent');
            
            if (fileInput.files.length === 0) {
                resultArea.innerHTML = '<p style="color: red;">请先选择文件</p>';
                return;
            }
            
            resultArea.innerHTML = '<p>正在上传...</p>';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            fetch('/upload_project', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultArea.innerHTML = '<h3>生成成功！</h3><p>' + data.data.course_content + '</p>';
                } else {
                    resultArea.innerHTML = '<p style="color: red;">' + data.error + '</p>';
                }
            })
            .catch(error => {
                resultArea.innerHTML = '<p style="color: red;">上传失败：' + error + '</p>';
            });
        }
        
        function submitHomework() {
            const textInput = document.getElementById('submissionText');
            const resultArea = document.getElementById('feedback');
            
            if (textInput.value.trim() === '') {
                resultArea.innerHTML = '<p style="color: red;">请输入作业内容</p>';
                return;
            }
            
            resultArea.innerHTML = '<p>正在提交...</p>';
            
            fetch('/submit_homework', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    submission: textInput.value
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultArea.innerHTML = '<h3>提交成功！</h3><p>' + data.data.feedback + '</p>';
                } else {
                    resultArea.innerHTML = '<p style="color: red;">' + data.error + '</p>';
                }
            })
            .catch(error => {
                resultArea.innerHTML = '<p style="color: red;">提交失败：' + error + '</p>';
            });
        }
    </script>
</body>
</html>
